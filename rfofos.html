const categories=[...new Set(meds.map(m=>m.category).filter(Boolean))].sort();
const catSel=document.getElementById('cat'); categories.forEach(c=>catSel.insertAdjacentHTML('beforeend',`<option value="${c}">${c}</option>`));
const common=['Analgésicos/antitérmicos','TGI','Antibióticos','Anti-histamínicos/corticoides/adrenalina','Antivirais','Antiparasitários','Principais ATBs na neonatologia'];
let activeChip=''; const chips=document.getElementById('chips'); chips.innerHTML=['Todos',...common].map(c=>`<button class="chip" data-c="${c==='Todos'?'':c}">${c}</button>`).join(''); chips.onclick=e=>{if(e.target.classList.contains('chip')){activeChip=e.target.dataset.c; document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.c===activeChip)); render();}}; document.querySelector('.chip').classList.add('active');
function norm(s){return (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')}
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function listText(s){ if(!s) return ''; let parts=s.split(/
|(?<=\.)\s+(?=[A-ZÁÉÍÓÚÃÕÇ#<>=\-])/).map(x=>x.trim()).filter(Boolean); return '<ul>'+parts.map(p=>`<li>${esc(p.replace(/^#\s*/,''))}</li>`).join('')+'</ul>' }
function selectedRisks(){let arr=[...document.querySelectorAll('.checks input:checked')].map(x=>x.value); if(document.getElementById('renal').value==='caution'||document.getElementById('renal').value==='dialysis')arr.push('renal'); if(document.getElementById('hepatic').value==='caution')arr.push('hepatic'); return arr}
function ageMonths(){let v=parseFloat(document.getElementById('age').value); if(!v&&v!==0)return null; let u=document.getElementById('ageUnit').value; return u==='dias'?v/30.44:u==='meses'?v:v*12}
function medRisk(m){const risks=selectedRisks(); return m.alerts?.some(a=>risks.includes(a.type))}
function patientWarningsFor(m){const risks=selectedRisks(); const out=[]; (m.alerts||[]).forEach(a=>{if(risks.includes(a.type) || ['contra','age'].includes(a.type)) out.push(a.text)}); const am=ageMonths(); if(am!==null){const txt=norm(m.raw+' '+m.posology+' '+m.notes); if(am<3 && (txt.includes('a partir de 3 meses')||txt.includes('> 3 meses'))) out.push('Idade informada < 3 meses: conferir restrição de idade neste medicamento.'); if(am<24 && (txt.includes('> 2 anos')||txt.includes('>= 2 anos')||txt.includes('maiores de 2 anos'))) out.push('Idade informada < 2 anos: conferir se uso é permitido/off-label.'); if(am<1 && txt.includes('neonat')) out.push('Paciente em faixa neonatal: conferir tabela específica de neonatologia.')} return [...new Set(out)];}
function calcDose(m){const kg=parseFloat(document.getElementById('weight').value); if(!kg || !m.formula) return ''; const min=m.formula.min*kg, max=m.formula.max*kg; let label=m.formula.per==='dia'?'mg/dia':'mg/dose'; let dose=min===max?`${min.toFixed(1)} ${label}`:`${min.toFixed(1)}–${max.toFixed(1)} ${label}`; let ml=''; if(m.concentrations && m.concentrations.length){let c=m.concentrations.find(x=>String(x.unit).toLowerCase().includes('mg/ml')); if(c && m.formula.per!=='dia'){ml=`<br>Com <b>${esc(c.label)}</b>: aprox. <b>${(min/c.value).toFixed(2)}–${(max/c.value).toFixed(2)} mL/dose</b>`;}} return `<div class="calcResult">Dose rápida pelo peso: <b>${dose}</b>${ml}<br><span class="muted">Cálculo automático aproximado pelo primeiro padrão mg/kg encontrado; conferir posologia completa e máximos.</span></div>`}
function sec(title, body){return body?`<div class="sec"><h4>${title}</h4>${body}</div>`:''}
function routesHtml(routes){ if(!routes||!Object.keys(routes).length)return ''; return '<div class="routes">'+Object.entries(routes).map(([r,items])=>`<div class="route"><b>${esc(r)}</b>${listText(items.join('
'))}</div>`).join('')+'</div>'}
function card(m){const warns=patientWarningsFor(m); const alertTags=(m.alerts||[]).slice(0,4).map(a=>`<span class="tag ${a.type==='contra'?'red':a.type==='renal'||a.type==='age'?'orange':'green'}">${a.type}</span>`).join(''); return `<article class="card ${warns.length?'warn':''}"><div class="titleRow"><div class="title">${esc(m.name)}</div><div class="cat">${esc(m.category)}</div></div><div class="tags">${alertTags}</div>${warns.length?`<div class="alertBox show"><b>⚠️ Atenção para este paciente:</b><br>${warns.map(esc).join('<br>')}</div>`:''}${calcDose(m)}${sec('Apresentação', listText(m.presentation))}${sec('Posologia organizada por via', routesHtml(m.routes) || listText(m.posology))}<details><summary>Ver detalhes completos</summary>${sec('Regra prática', listText(m.rule))}${sec('Diluição / administração / concentração', listText(m.dilution))}${sec('Tempo de infusão', listText(m.time))}${sec('Ajustes renal/hepático', listText(m.adjustments))}${sec('Observações e contraindicações', listText(m.notes))}${sec('Texto revisado extraído', listText(m.raw))}</details></article>`}
function render(){const q=norm(document.getElementById('search').value), c=catSel.value||activeChip, af=document.getElementById('alertFilter').value; let arr=meds.filter(m=>(!c||m.category===c)&&(!af||(m.alerts||[]).some(a=>a.type===af))&&(!q||norm(m.search).includes(q))); arr.sort((a,b)=>(medRisk(b)-medRisk(a))||a.name.localeCompare(b.name)); document.getElementById('count').textContent=`${arr.length} item(ns)`; document.getElementById('grid').innerHTML=arr.length?arr.map(card).join(''):'<div class="empty">Nenhuma medicação encontrada.</div>'; updatePatientAlerts(arr);}
function updatePatientAlerts(arr){const risks=selectedRisks(); const box=document.getElementById('patientAlerts'); if(!risks.length){box.className='alertBox'; box.innerHTML=''; return} const n=arr.filter(m=>medRisk(m)).length; box.className='alertBox show'; box.innerHTML=`<b>⚠️ Alertas ativados:</b> ${risks.join(', ')}. ${n} item(ns) da busca atual têm cautela relacionada. Os cards relevantes ficam destacados.`}
function openAlerts(){const risks=selectedRisks(); const content=document.getElementById('modalContent'); const groups={renal:'Função renal/diálise',hepatic:'Hepatopatia',allergy_dip:'Alergia à dipirona',betalactam:'Alergia a beta-lactâmicos',aine:'AINEs',opioid:'Opioides/depressão SNC',milk:'APLV/lactose/excipientes',age:'Idade/neonatal',contra:'Contraindicações'}; let html='<p>Use este painel para conferir medicações que exigem cautela conforme dados do paciente.</p>'; Object.entries(groups).forEach(([k,label])=>{let list=meds.filter(m=>(m.alerts||[]).some(a=>a.type===k)).slice(0,80); if(list.length) html+=`<h3>${label}</h3><p>${list.map(m=>esc(m.name)).join(', ')}</p>`}); content.innerHTML=html; document.getElementById('modal').classList.add('show')}
function closeAlerts(){document.getElementById('modal').classList.remove('show')}
['search','cat','alertFilter','weight','age','ageUnit','renal','hepatic'].forEach(id=>document.getElementById(id).addEventListener('input',render)); document.querySelectorAll('.checks input').forEach(x=>x.addEventListener('change',render)); render();
</script></body></html>

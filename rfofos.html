 let routeDivs=routes.map((r,i)=>`<div class="routePane" data-route="${id}-${i}" style="display:${i===0?'block':'none'}">${routeCalcHtml(m,r,i)}</div>`).join('');
 let pres=(m.presentations||[]).map(p=>`• ${p.label}`).join('\n');
 let copyText = `${m.name}\n` + routes.map(r=>`${r.route}: ${r.freqText||''}`).join('\n');
 return `<article class="card ${alerts.some(a=>a.type==='contra')?'alert':''}"><h3>${m.name}</h3><div class="meta"><span class="tag">${m.category}</span>${routes.some(r=>/EV/.test(r.route))?'<span class="tag green">EV</span>':''}${routes.some(r=>/VO/.test(r.route))?'<span class="tag green">VO</span>':''}${alerts.some(a=>a.type==='contra')?'<span class="tag red">alerta</span>':''}</div>${alertHtml}<div class="tabs">${tabs}</div>${routeDivs}<details class="hiddenInfo"><summary>Ver apresentações e observações</summary><div class="raw">${pres||'Sem apresentações cadastradas.'}</div></details><button class="copyBtn" onclick="navigator.clipboard&&navigator.clipboard.writeText(${JSON.stringify(copyText).replace(/</g,'\\u003c')})">Copiar resumo</button></article>`;
}
function showRoute(id,idx,btn){let card=btn.closest('.card'); card.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); card.querySelectorAll('.routePane').forEach(p=>p.style.display='none'); card.querySelector(`[data-route="${id}-${idx}"]`).style.display='block'}
function updateTopAlerts(list){let problems=[];let allergies=checkedAllergies();let ag=ageDays();
 if(els.renal.value==='sim') problems.push('Doença renal/ClCr baixo marcado: revisar dose/intervalo de antibióticos, AINEs, aminoglicosídeos, vancomicina, aciclovir etc.');
 if(els.hepatica.value==='sim') problems.push('Doença hepática marcada: cautela com paracetamol, metronidazol, fluconazol e outras drogas hepatometabolizadas.');
 if(els.cardio.value==='sim') problems.push('Cardiopatia/QT marcado: cautela com ondansetrona, adrenalina, salbutamol e macrolídeos.');
 allergies.forEach(a=>problems.push('Alergia/cautela marcada: '+a+'.')); if(ag!=null && ag<28) problems.push('Recém-nascido: revisar idade mínima, ceftriaxona, doses neonatais e diluições.');
 if(problems.length){els.topAlerts.classList.add('show');els.alertList.innerHTML=problems.map(p=>`<li>${p}</li>`).join('')}else{els.topAlerts.classList.remove('show')}
}
function render(){let q=norm(els.q.value); let c=els.cat.value; let rf=els.routeFilter.value; let arr=MEDS.filter(m=>{let hay=norm([m.name,m.category,(m.aliases||[]).join(' '),(m.routes||[]).map(r=>r.route).join(' ')].join(' ')); return (!q||hay.includes(q)) && (!c||m.category===c) && (!rf||(m.routes||[]).some(r=>norm(r.route).includes(norm(rf))))});
 updateTopAlerts(); els.count.textContent=`${arr.length} medicação(ões) encontrada(s)`; els.grid.innerHTML=arr.map(card).join('') || '<div class="empty">Nenhuma medicação encontrada.</div>'}
function init(){let cats=[...new Set(MEDS.map(m=>m.category))].sort(); cats.forEach(c=>els.cat.insertAdjacentHTML('beforeend',`<option>${c}</option>`)); let qs=['dipirona','ondansetrona','ceftriaxona','ampicilina','pneumonia','vômitos','dor','asma','ITU','EV']; document.getElementById('quick').innerHTML=qs.map(x=>`<button class="pill" onclick="els.q.value='${x}';render()">${x}</button>`).join(''); document.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',render)); render()}
init();
</script></body></html>

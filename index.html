<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PediCalc — Calculadoras Pediátricas</title>
<style>
:root{--bg:#f8f5ff;--card:#fff;--text:#251b35;--muted:#746883;--pri:#7c3aed;--pri2:#06b6d4;--pink:#ec4899;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--border:#eadff7;--shadow:0 12px 32px rgba(90,42,160,.10)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#efe7ff 0,#f8f5ff 32%,#eefaff 100%);color:var(--text)}.wrap{max-width:1120px;margin:auto;padding:22px}header{padding:34px 0 22px}.badge{display:inline-flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 12px;color:#5b21b6;font-weight:700;font-size:13px;box-shadow:var(--shadow)}h1{font-size:clamp(32px,6vw,58px);line-height:1.02;margin:18px 0 10px;color:#4c1d95}.sub{font-size:17px;color:var(--muted);max-width:800px;line-height:1.5}.topbar{display:grid;grid-template-columns:1fr 190px;gap:12px;margin:20px 0}input,select{width:100%;border:1px solid var(--border);border-radius:18px;padding:14px 16px;font:inherit;background:#fff;color:var(--text);box-shadow:0 6px 18px rgba(90,42,160,.05)}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:22px 0 12px}.section-title h2{font-size:20px;margin:0;color:#4c1d95}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:16px}.card{position:relative;display:flex;flex-direction:column;gap:10px;min-height:176px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:26px;padding:18px;text-decoration:none;color:inherit;box-shadow:var(--shadow);overflow:hidden;transition:.15s transform,.15s box-shadow}.card:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(90,42,160,.16)}.card:before{content:"";position:absolute;inset:auto -30px -45px auto;width:130px;height:130px;border-radius:50%;background:var(--accent,#7c3aed);opacity:.12}.icon{width:48px;height:48px;display:grid;place-items:center;border-radius:16px;background:color-mix(in srgb,var(--accent,#7c3aed) 14%,white);font-size:25px}.card h3{font-size:20px;margin:0;color:#27133f}.card p{margin:0;color:var(--muted);font-size:14px;line-height:1.4}.tags{margin-top:auto;display:flex;flex-wrap:wrap;gap:7px}.tag{font-size:12px;background:#f5f3ff;color:#5b21b6;border-radius:999px;padding:5px 9px}.soon{opacity:.72}.soon .tag:first-child{background:#fff7ed;color:#9a3412}.footer{margin:34px 0 10px;padding:18px;border:1px dashed #c4b5fd;border-radius:22px;color:#6b5d79;background:rgba(255,255,255,.62);font-size:13px;line-height:1.45}@media(max-width:720px){.wrap{padding:16px}.topbar{grid-template-columns:1fr}.card{min-height:150px}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="badge">🩺 PediCalc offline</div>
  <h1>Calculadoras Pediátricas</h1>
  <div class="sub">Calculadora por Iguinho do SUS</div>
  <div class="topbar">
    <input id="search" placeholder="Buscar: medicações, asma, diarreia, cálculos..." autofocus>
    <select id="filter">
      <option value="">Todos</option>
      <option>Calculadora</option>
      <option>Protocolo</option>
      <option>Medicações</option>
    </select>
  </div>
</header>

<div class="section-title"><h2>Módulos principais</h2><span id="count"></span></div>
<div class="grid" id="grid"></div>

<div class="footer">
  <b></b>.
</div>
</div>
<script>
const modules=[
 {title:'RFOFOS 2026 / Medicações',desc:'Busca offline com doses, apresentações, vias, diluições, tempo de infusão, regras práticas e calculadora mg/kg.',href:'rfofos.html',icon:'💊',type:'Medicações',tags:['RFOFOS','Busca','Dose'],accent:'#7c3aed'},
 {title:'Cálculos gerais',desc:'Calculadora geral para dose por peso, medicações comuns, hidratação e prescrições rápidas.',href:'calculos-gerais.html',icon:'🧮',type:'Calculadora',tags:['Peso','mL','Prescrição'],accent:'#06b6d4'},
 {title:'Asma',desc:'Classificação leve/moderada/grave, salbutamol, ipratrópio, corticoide, magnésio e reavaliação.',href:'asma.html',icon:'🫁',type:'Protocolo',tags:['PA','Puffs','Conduta'],accent:'#10b981'},
 {title:'Diarreia / GECA',desc:'Planos A, B e C, SRO, ondansetrona, zinco, hidratação e prescrição para casa.',href:'diarreia.html',icon:'💧',type:'Protocolo',tags:['SRO','Zinco','Vômitos'],accent:'#0ea5e9'}
];
const grid=document.getElementById('grid'), search=document.getElementById('search'), filter=document.getElementById('filter'), count=document.getElementById('count');
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function render(){const q=norm(search.value), f=filter.value; let arr=modules.filter(m=>(!f||m.type===f) && (!q||norm(m.title+' '+m.desc+' '+m.type+' '+m.tags.join(' ')).includes(q))); count.textContent=arr.length+' módulo(s)'; grid.innerHTML=arr.map(m=>`<a class="card" href="${m.href}" style="--accent:${m.accent}"><div class="icon">${m.icon}</div><h3>${m.title}</h3><p>${m.desc}</p><div class="tags">${m.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></a>`).join('') || '<div class="footer">Nenhum módulo encontrado.</div>'}
search.addEventListener('input',render); filter.addEventListener('input',render); render();
</script>
</body>
</html>
